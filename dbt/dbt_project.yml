name: 'nyc_taxi'
version: '1.0.0'
config-version: 2

profile: 'nyc_taxi'

model-paths:    ["models"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]
docs-paths:     ["docs"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ---------------------------------------------------------------------------
# Seed configuration
# ---------------------------------------------------------------------------
seeds:
  nyc_taxi:
    taxi_zone_lookup:
      +column_types:
        LocationID:   integer
        Borough:      varchar
        Zone:         varchar
        service_zone: varchar

# ---------------------------------------------------------------------------
# Model materialisation defaults (DuckDB)
# ---------------------------------------------------------------------------
models:
  nyc_taxi:
    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: view
      +schema: intermediate

    marts:
      +materialized: table
      +schema: marts
