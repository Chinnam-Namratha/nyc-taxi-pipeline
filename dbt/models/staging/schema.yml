version: 2

models:

  - name: stg_yellow_trips
    description: >
      Staged NYC yellow taxi trips — columns renamed to snake_case, types
      enforced, and trip_duration_minutes derived.  Contains ALL raw rows;
      invalid trips are filtered in the intermediate layer.
    columns:

      - name: trip_id
        description: "MD5 surrogate key (pickup datetime + dropoff datetime + location IDs + fare)"
        tests:
          - not_null
          - unique

      - name: pickup_datetime
        description: "Passenger pickup timestamp"
        tests:
          - not_null

      - name: dropoff_datetime
        description: "Passenger dropoff timestamp"
        tests:
          - not_null

      - name: trip_duration_minutes
        description: "Elapsed minutes from pickup to dropoff"
        tests:
          - not_null

      - name: pickup_date
        description: "Date portion of pickup_datetime"
        tests:
          - not_null

      - name: pickup_location_id
        description: "TLC pickup zone ID"
        tests:
          - not_null

      - name: dropoff_location_id
        description: "TLC dropoff zone ID"
        tests:
          - not_null

      - name: fare_amount
        description: "Meter fare — may be negative or zero in raw data (filtered downstream)"
        tests:
          - not_null

      - name: total_amount
        description: "Total charged amount"
        tests:
          - not_null

  - name: stg_taxi_zones
    description: >
      NYC TLC taxi zones — 265 zones mapped to borough and friendly name.
      Populated from the taxi_zone_lookup seed CSV.
    columns:

      - name: location_id
        description: "TLC zone location ID (primary key)"
        tests:
          - not_null
          - unique

      - name: borough
        description: "NYC borough (Manhattan, Brooklyn, Queens, Bronx, Staten Island, EWR)"
        tests:
          - not_null

      - name: zone_name
        description: "Human-readable zone name"
        tests:
          - not_null
